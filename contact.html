<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | InsightEngine Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style> body { font-family: 'Inter', sans-serif; } </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col">

    <header class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-6xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black tracking-tighter text-slate-900 hover:opacity-80 transition-opacity">
                INSIGHT<span class="text-blue-600">ENGINE.</span>
            </a>
            <a href="index.html" class="text-sm font-semibold text-blue-600 hover:underline">
                Retour à l'outil
            </a>
        </div>
    </header>

    <main class="flex-grow max-w-2xl mx-auto w-full px-6 py-16">
        <h1 class="text-4xl font-extrabold tracking-tight mb-4">Contactez-nous</h1>
        <p class="text-slate-500 mb-10">Une question sur notre outil B2B ou besoin d'une offre sur-mesure pour votre entreprise ? Remplissez le formulaire ci-dessous.</p>

        <form id="contactForm" class="bg-white p-8 shadow-xl shadow-slate-200/50 rounded-3xl border border-slate-100">
            <div class="mb-6">
                <label for="name" class="block text-sm font-bold text-slate-700 mb-2">Nom complet</label>
                <input type="text" id="name" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" required>
            </div>
            
            <div class="mb-6">
                <label for="email" class="block text-sm font-bold text-slate-700 mb-2">Adresse email</label>
                <input type="email" id="email" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" required>
            </div>

            <div class="mb-8">
                <label for="message" class="block text-sm font-bold text-slate-700 mb-2">Votre message</label>
                <textarea id="message" rows="5" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-blue-500 focus:ring-2 focus:ring-blue-200 transition-all" required></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-blue-600 transition-all shadow-lg">
                Envoyer le message
            </button>
            <p id="successMsg" class="hidden text-green-600 font-bold mt-4 text-center">✅ Message envoyé avec succès !</p>
        </form>
    </main>

    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-6xl mx-auto px-6 py-8 flex flex-col md:flex-row justify-between items-center text-sm text-slate-500">
            <p>© 2026 InsightEngine Pro. Tous droits réservés.</p>
            <div class="flex space-x-6 mt-4 md:mt-0">
                <a href="confidentialite.html" class="hover:text-slate-900">Confidentialité</a>
                <a href="contact.html" class="hover:text-slate-900">Contact</a>
            </div>
        </div>
    </footer>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Envoi en cours...";
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                message: document.getElementById('message').value
            };

            try {
                await fetch('/contact', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                btn.classList.add('hidden');
                document.getElementById('successMsg').classList.remove('hidden');
            } catch (error) {
                alert("Erreur lors de l'envoi.");
                btn.innerText = "Envoyer le message";
            }
        });
    </script>
</body>
</html>
